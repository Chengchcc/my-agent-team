name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check dist freshness
        run: |
          if [ -n "$(git diff --name-only -- 'packages/*/dist' 'apps/*/dist')" ]; then
            echo "ERROR: dist/ is stale. Run 'bun run build' and commit the dist/ changes."
            echo ""
            echo "Changed files:"
            git diff --name-only -- 'packages/*/dist' 'apps/*/dist'
            echo ""
            echo "Full diff:"
            git diff -- 'packages/*/dist' 'apps/*/dist'
            exit 1
          fi
          echo "dist/ is fresh"
