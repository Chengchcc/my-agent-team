name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate drizzle migrations
        run: bash scripts/gen-drizzle.sh

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify dist fresh for all packages
        run: |
          missing=""
          stale=""
          for pkg in packages/*/ apps/*/; do
            pkg_name=$(basename "$pkg")
            [ -f "$pkg/package.json" ] || continue
            # Skip packages that don't have a build step
            grep -q '"build"' "$pkg/package.json" || continue
            # Web outputs to .next/ instead of dist/
            if [ -d "$pkg/.next" ]; then
              # Next.js: check .next exists and is fresh
              newest_src=$(find "$pkg/src" -type f \( -name '*.ts' -o -name '*.tsx' \) -newer "$pkg/.next/BUILD_ID" 2>/dev/null | head -1)
              if [ -n "$newest_src" ]; then
                stale="$stale  $pkg_name ($newest_src newer than .next/BUILD_ID)\n"
              fi
              continue
            fi
            # Find the newest .js file in dist/ as the freshness anchor
            build_marker=$(find "$pkg/dist" -name '*.js' -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
            if [ -z "$build_marker" ]; then
              missing="$missing  $pkg_name (no .js files in dist/)\n"
              continue
            fi
            # Check dist freshness: any src file newer than build output = stale
            newest_src=$(find "$pkg/src" -type f \( -name '*.ts' -o -name '*.tsx' \) -newer "$build_marker" 2>/dev/null | head -1)
            if [ -n "$newest_src" ]; then
              stale="$stale  $pkg_name ($newest_src newer than $build_marker)\n"
            fi
          done
          err=0
          if [ -n "$missing" ]; then
            echo "ERROR: Some packages are missing dist/ after build:"
            printf "$missing"
            err=1
          fi
          if [ -n "$stale" ]; then
            echo "ERROR: Some packages have stale dist/ (src newer than build output):"
            printf "$stale"
            echo ""
            echo "Run 'bun run build' locally to regenerate."
            err=1
          fi
          if [ $err -eq 0 ]; then
            echo "All package dists present and fresh"
          fi
          exit $err
