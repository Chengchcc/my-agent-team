name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify dist exists for all packages
        run: |
          missing=""
          for pkg in packages/*/ apps/*/; do
            pkg_name=$(basename "$pkg")
            # Skip if no package.json (not a real package)
            [ -f "$pkg/package.json" ] || continue
            # Check dist/index.js exists (every package must produce this)
            if [ ! -f "$pkg/dist/index.js" ]; then
              missing="$missing  $pkg_name (dist/index.js not found)\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "ERROR: Some packages are missing dist/ after build:"
            printf "$missing"
            echo ""
            echo "This means a package's tsconfig or build script is broken,"
            echo "or a new package was added without proper build configuration."
            exit 1
          fi
          echo "All package dists present"
