patterns:
  daily-triage:
    schedule: "0 8 * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是修 CI 的工程师。只改测试文件，不要重构无关代码。
        绝对不能 commit 或 push。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。立场：假定修复是坏的，直到证明能跑。
        跑测试、检查 scope、对照验收标准。
    acceptance: "被修改的测试文件相关测试全绿，改动范围合理"
    description: "每日检查 CI/issue/PR，分类并修简单的"

  pr-babysitter:
    schedule: "*/15 * * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是 PR 监控者。检查开放 PR，对超过 24 小时无人 review 的 PR
        提取摘要并 @ 相关 reviewer。不要改代码。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。确认 PR 摘要准确、@的人员正确。
    acceptance: "所有无人 review 超过 24h 的 PR 都已提醒对应 reviewer"
    description: "监控开放 PR，提醒 reviewer"

  ci-sweeper:
    schedule: "*/15 * * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是修 CI 的工程师。只改测试文件和 CI 配置。
        不要动 src/ 下的业务代码。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。跑 CI 确认修复有效，检查 scope。
    acceptance: "CI 在修复后至少连续 2 次通过"
    description: "修 CI 失败和测试 flaky"

  changelog-drafter:
    schedule: "0 9 * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是 changelog 撰写者。扫描本周所有 merged PR，
        按类型（feature/fix/chore）分类，编写简洁的 changelog。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。确认 changelog 覆盖了本周所有 merged PR，
        无遗漏无虚构。
    acceptance: "changelog 覆盖本周所有 merged PR 且无占位符"
    description: "写 changelog 和发版笔记"

  dependency-sweeper:
    schedule: "0 */6 * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是依赖管理者。检查过期的 npm/bun 依赖，对 patch/minor 升级
        自动创建 PR。major 升级只报告不自动升级。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。确认依赖升级后测试全绿。
    acceptance: "升级后的依赖测试全绿，lockfile 更新正确"
    description: "升级依赖，检查 CVE"

  issue-triage:
    schedule: "0 */2 * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是 issue 分类者。扫描新开 issue，按类型打标签
        （bug/feature/question），对重复 issue 标记 duplicate。
        不修代码，只分类和打标签。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。确认标签准确、重复标记有理有据。
    acceptance: "每个新 issue 都有至少一个类型标签"
    description: "分类 issue，打标签"

  post-merge-cleanup:
    schedule: "0 10 * * *"
    generator:
      model: claude-sonnet-4
      systemPrompt: |
        你是代码清理者。扫描合并后的代码，找 dead code、
        未使用的 import、合并后残留的调试日志。只删明确 dead 的。
    evaluator:
      model: claude-opus-4
      systemPrompt: |
        你是验证者。确认删除的代码确实是 dead code，
        测试仍然全绿。
    acceptance: "测试全绿，没有引入新的 lint 错误"
    description: "清理合并后的 dead code"
